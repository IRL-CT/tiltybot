<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>TiltyBot Tilty</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#111;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center}
h3{margin:0.5em}
h4{margin:0.3em;font-weight:normal}
#status{color:#0f0;font-size:0.8em}
label{margin:0.5em}
input[type=range]{width:80vw;max-width:400px}
.back{position:fixed;top:10px;left:10px;color:#888;text-decoration:none}
.vert-container{height:50vh;display:flex;align-items:center;justify-content:center}
.vert-container input{transform:rotate(270deg);width:50vh}
</style></head><body>
<a class="back" href="/">← back</a>
<h3>Tilty</h3>
<p id="status">Connecting...</p>
<label>Gyro: <input id="active" type="checkbox"></label>
<h4>Pan: <span id="pan">0</span></h4>
<h4>Tilt: <span id="tilt">0</span></h4>
<div class="vert-container"><input id="tiltIn" type="range" min="10" max="70" value="40"></div>
<input id="panIn" type="range" min="-45" max="45" value="0">
<script>
var ws,active=document.getElementById('active'),statusEl=document.getElementById('status');
var panEl=document.getElementById('pan'),tiltEl=document.getElementById('tilt');
var panIn=document.getElementById('panIn'),tiltIn=document.getElementById('tiltIn');
var b=parseFloat(tiltIn.value),g=parseFloat(panIn.value);
function connect(){
  var proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(proto+'//'+location.host+'/ws/tilty');
  ws.onopen=function(){statusEl.textContent='Connected';statusEl.style.color='#0f0'};
  ws.onclose=function(){statusEl.textContent='Disconnected';statusEl.style.color='#f00';setTimeout(connect,2000)};
}
connect();
function send(){if(ws&&ws.readyState===1)ws.send(JSON.stringify({b:b,g:g}))}
tiltIn.oninput=function(){b=parseFloat(tiltIn.value);tiltEl.textContent=b;send()};
panIn.oninput=function(){g=parseFloat(panIn.value);panEl.textContent=g;send()};
active.onchange=function(){
  if(active.checked){
    panIn.disabled=true;tiltIn.disabled=true;
    if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
      DeviceMotionEvent.requestPermission().then(function(s){
        if(s==='granted')window.addEventListener('deviceorientation',handleOri,true);
      });
    }else{window.addEventListener('deviceorientation',handleOri,true)}
  }else{panIn.disabled=false;tiltIn.disabled=false}
};

/* ---- Gyro handling ----
 * Gimbal lock: when beta approaches +/-90, gamma becomes degenerate
 * and flips wildly. We clamp beta to 10-70 and freeze gamma when
 * beta > 70. Low-pass filter (EMA) smooths both axes. Throttled to
 * ~30Hz to match motor bus capacity.
 * TODO: quaternion-based direction vector extraction for full range
 */
var smoothB=40,smoothG=0; // filtered values
var lastG=0;              // last stable gamma (for freeze)
var EMA=0.3;              // low-pass filter strength (0=sluggish, 1=raw)
var DEADZONE=0.5;         // ignore changes smaller than this (degrees)
var sendInterval=33;      // ~30Hz throttle (ms)
var lastSendTime=0;

function handleOri(e){
  if(!active.checked)return;
  var rawBeta=e.beta,rawGamma=e.gamma;

  // Clamp beta to safe range
  var clampedBeta=Math.max(10,Math.min(70,rawBeta));

  // Freeze gamma when beta is in the gimbal lock zone
  var safeGamma=(Math.abs(rawBeta)>70)?lastG:rawGamma;
  lastG=safeGamma;

  // Low-pass filter (exponential moving average)
  smoothB=smoothB+(clampedBeta-smoothB)*EMA;
  smoothG=smoothG+(safeGamma-smoothG)*EMA;

  // Deadzone: skip if change is tiny
  if(Math.abs(smoothB-b)<DEADZONE && Math.abs(smoothG-g)<DEADZONE) return;

  // Throttle send rate to ~30Hz
  var now=Date.now();
  if(now-lastSendTime<sendInterval) return;
  lastSendTime=now;

  b=parseFloat(smoothB.toFixed(2));
  g=parseFloat(smoothG.toFixed(2));
  tiltEl.textContent=b;panEl.textContent=g;
  send();
}
try{navigator.wakeLock.request('screen')}catch(e){}
</script></body></html>
