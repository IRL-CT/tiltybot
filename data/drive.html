<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>TiltyBot Drive</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="/style.css">
<style>
html,body{height:100%;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
h3{margin:0.5em}
label{margin:1em}
canvas{border:1px solid #1e1e26;border-radius:50%;touch-action:none}
</style></head><body>
<a class="back" href="/">&#8592; back</a>
<h3>Drive</h3>
<p id="status">Connecting...</p>
<label>Active: <input id="active" type="checkbox"></label>
<canvas id="joy" width="300" height="300"></canvas>
<script>
var ws,active=document.getElementById('active'),statusEl=document.getElementById('status');
var canvas=document.getElementById('joy'),ctx=canvas.getContext('2d');
var cx=150,cy=150,r=130,jx=0,jy=0,touching=false;
function connect(){
  var proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(proto+'//'+location.host+'/ws/drive');
  ws.onopen=function(){statusEl.textContent='Connected';statusEl.style.color='#4a8'};
  ws.onclose=function(){statusEl.textContent='Disconnected';statusEl.style.color='#e88';setTimeout(connect,2000)};
}
connect();
function draw(){
  ctx.clearRect(0,0,300,300);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#1e1e26';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fillStyle='#333';ctx.fill();
  var px=cx+jx*r/100,py=cy-jy*r/100;
  ctx.beginPath();ctx.arc(px,py,25,0,Math.PI*2);ctx.fillStyle='#2a7fa8';ctx.fill();
}
draw();
function getPos(e){
  var rect=canvas.getBoundingClientRect(),t=e.touches?e.touches[0]:e;
  var dx=t.clientX-rect.left-cx,dy=-(t.clientY-rect.top-cy),dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>r){dx=dx/dist*r;dy=dy/dist*r}
  return{x:Math.round(dx/r*100),y:Math.round(dy/r*100)};
}
var lastMoveTime=0, stopped=true;
canvas.addEventListener('pointerdown',function(e){
  touching=true;lastMoveTime=Date.now();
  var p=getPos(e);jx=p.x;jy=p.y;draw();
});
canvas.addEventListener('pointermove',function(e){
  if(!touching)return;
  lastMoveTime=Date.now();
  var p=getPos(e);jx=p.x;jy=p.y;draw();
});
function release(){
  if(!touching)return;
  touching=false;jx=0;jy=0;draw();
}
document.addEventListener('pointerup',release);
document.addEventListener('pointercancel',release);
function send(){
  if(!ws||ws.readyState!==1)return;
  if(!active.checked){if(!stopped){ws.send(JSON.stringify({b:0,g:0}));stopped=true;}return;}
  ws.send(JSON.stringify({b:jx,g:jy}));
  stopped=(jx===0&&jy===0);
}
// 10Hz loop: sends current state, dead-man's switch if touch lost
setInterval(function(){
  if(touching&&Date.now()-lastMoveTime>300)release();
  send();
},100);
</script></body></html>
